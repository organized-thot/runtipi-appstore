services:
  librechat:
    image: registry.librechat.ai/danny-avila/librechat-dev:latest
    container_name: librechat
    restart: unless-stopped
    volumes:
      - ${APP_DATA_DIR}/data/.env:/app/.env
      - ${APP_DATA_DIR}/data/images:/app/client/public/images
      - ${APP_DATA_DIR}/data/uploads:/app/uploads
      - ${APP_DATA_DIR}/data/logs:/app/logs
    environment:
      - HOST=${HOST:-0.0.0.0}
      - MONGO_URI=${MONGO_URI:-mongodb://mongodb:27017/LibreChat}
      - MEILI_HOST=${MEILI_HOST:-http://meilisearch:7700}
      - RAG_PORT=${RAG_PORT:-8000}
      - RAG_API_URL=${RAG_API_URL:-http://rag_api:8000}
    x-runtipi:
      is_main: true
      internal_port: 8080
  librechat-mongodb:
    image: mongo:8.0.20
    container_name: librechat-mongodb
    restart: unless-stopped
    volumes:
      - ${APP_DATA_DIR}/data/data-node:/data/db
  librechat-meilisearch:
    image: getmeili/meilisearch:v1.35.1
    container_name: librechat-meilisearch
    restart: unless-stopped
    volumes:
      - ${APP_DATA_DIR}/data/meili_data_v1.35.1:/meili_data
    environment:
      - MEILI_HOST=${MEILI_HOST:-http://meilisearch:7700}
      - MEILI_NO_ANALYTICS=${MEILI_NO_ANALYTICS:-true}
      - MEILI_MASTER_KEY=${MEILI_MASTER_KEY:-latest}
  librechat-vectordb:
    image: pgvector/pgvector:0.8.0-pg15-trixie
    container_name: librechat-vectordb
    restart: unless-stopped
    volumes:
      - ${APP_DATA_DIR}/data/pgdata2:/var/lib/postgresql/data
    environment:
      - POSTGRES_DB=${POSTGRES_DB:-mydatabase}
      - POSTGRES_USER=${POSTGRES_USER:-myuser}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-mypassword}
  librechat-rag_api:
    image: registry.librechat.ai/danny-avila/librechat-rag-api-dev-lite:latest
    container_name: librechat-rag_api
    restart: unless-stopped
    environment:
      - DB_HOST=${DB_HOST:-vectordb}
      - RAG_PORT=${RAG_PORT:-8000}
x-runtipi:
  schema_version: 2
